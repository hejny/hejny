Services:
    title: Jak Vám pomohu?
    content: |
        AI není jeden nástroj ani jedno školení. Je to průběžný proces, který potřebuje dobrý výběr use-casů,
        pravidla, kontext a kontrolu kvality.
    consult:
        title: AI konzultace
        content: |
            Pomohu vám vyhodnotit, kde AI skutečně dává smysl, jaké nástroje zvolit,
            jak ošetřit data, oprávnění, vendor lock-in a jak nastavit firemní proces.
    talk:
        title: Přednáška / workshop
        content: |
            Přednáším o AI ve firmách, AI codingu, agentních workflow i o tom,
            kde končí hype a začíná použitelný produkční proces.
    prototype:
        title: AI agent / prototyp
        content: |
            Postavím pilotní řešení, interního agenta nebo prototyp workflow,
            na kterém si bezpečně ověříte přínos dřív, než AI pustíte do produkce.
    action: Spojme se 🚀

