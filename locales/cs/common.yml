PavolHejny:
    title: Kdo jsem?
    content: |
        Jsem Pavol, vývojář s více než 15letou každodenní zkušeností s vývojem aplikací.

        Dnes se soustředím hlavně na AI: pomáhám firmám spouštět jejich vlastní AI, nastavovat agentní workflow a zavádět procesy pro bezpečné a efektivní AI coding.

        Jsem Founder & CTO v Promptbooku, ekosystému pro persistentní AI agenty, kteří pracují s cíli, znalostmi, pravidly a firemním kontextem místo jednorázového chatování.

        V praxi řeším témata jako AI vendor lock-in, ochranu dat, spolehlivost výstupů, rulesety, knowledge base, management oprávnění a automatizaci rutinní práce napříč firmou.

        Ve vývoji prosazuji AI coding s procesem: práce s PRD, Gitem, testy, CI/CD, code review, backlogem a měřením toho, zda čas lidí i tokeny agentů dávají smysl.

        Vedle Promptbooku jsem členem konzultační skupiny Ainautes a pravidelně přednáším o AI ve firmách, vibe-codingu a rozdílu mezi hype a produkční realitou.

        Dříve jsem vytvořil virtuální tabuli Collboard a elektronické učebnice H-edu, pracoval na vědeckých projektech České společnosti ornitologické a postavil řadu dalších produktů od prototypu po produkci.

        Většinu mých projektů najdete open-source na mém GitHubu.

